<style>
  :root{
    --bg:#0B1626; --ink:#EAF1FB; --muted:#7FA6D9; --accent:#4C8DFF;
    --line:#1C3252; --card:#10203A; --btn:#132646;
  }
  :root[data-theme="light"]{
    --bg:#F2F6FB; --ink:#0A2340; --muted:#5B7395; --accent:#1D5FD6;
    --line:#D9E4F2; --card:#FFFFFF; --btn:#E8EFF9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:860px;margin:0 auto;padding:0 22px}

  /* topbar — стандарт линейки */
  .topbar{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line)}
  .bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;max-width:860px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:9px;color:var(--ink)}
  .brandmark{width:26px;height:26px;flex:none}
  .wm{font-family:"Fraunces",serif;font-weight:600;font-size:18px;letter-spacing:.2px}
  .wm b{color:var(--accent);font-weight:600}
  .topctrl{display:flex;align-items:center;gap:8px}
  .rbtn{width:40px;height:40px;min-width:40px;padding:0;border-radius:50%;border:1px solid var(--line);
    background:var(--btn);color:var(--ink);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.15s;flex:none}
  .rbtn:hover{border-color:var(--accent)}
  .rbtn:active{transform:scale(.92)}
  .langwrap{position:relative}
  .menu{position:absolute;top:48px;right:0;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:6px;min-width:176px;display:none;box-shadow:0 12px 30px rgba(0,0,0,.28);z-index:40}
  .menu.open{display:block}
  .menu button{display:flex;gap:10px;align-items:center;width:100%;padding:8px 10px;border-radius:8px;border:none;
    background:transparent;color:var(--muted);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;text-align:left}
  .menu button:hover{background:var(--btn);color:var(--ink)}
  .menu button.on{color:var(--accent);font-weight:600}
  .menu .code{display:inline-block;width:26px;font-weight:700;font-size:12px}

  /* hero */
  .hero{padding:52px 0 34px}
  .kicker{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:16px}
  h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(30px,5.6vw,48px);line-height:1.1;letter-spacing:-.5px;max-width:18ch}
  .tickerLbl{margin-top:26px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .ticker{font-family:"Fraunces",serif;font-weight:600;color:var(--accent);
    font-size:clamp(44px,10vw,76px);line-height:1.05;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
  .tierb{margin-top:6px;font-family:"Fraunces",serif;font-size:clamp(16px,3vw,21px);font-weight:500;color:var(--muted);
    opacity:0;transition:opacity .8s}
  .tierb.on{opacity:1}
  .sub{margin-top:18px;font-size:clamp(15px,2.2vw,18px);color:var(--muted);max-width:54ch}
  .primary{display:inline-flex;align-items:center;gap:9px;margin-top:24px;background:var(--accent);color:#fff;
    border:none;cursor:pointer;text-decoration:none;font-family:inherit;font-weight:600;font-size:16px;
    padding:14px 26px;border-radius:999px;transition:.15s}
  .primary:hover{transform:translateY(-1px)}

  /* поток денег */
  .flow{margin:34px 0 6px}
  .flow svg{width:100%;max-width:640px;height:auto;display:block}
  .flowline{stroke-dasharray:7 8;animation:run 1.1s linear infinite}
  @keyframes run{to{stroke-dashoffset:-15}}
  .coin{fill:var(--accent)}
  .coinMotion text{fill:#fff;font:700 11px "Inter",sans-serif}

  section{padding:34px 0;border-top:1px solid var(--line)}
  .eyebrow{font-family:"Fraunces",serif;font-size:21px;font-weight:600;margin-bottom:22px}
  .grid{display:grid;gap:14px}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .card .amt{font-family:"Fraunces",serif;color:var(--accent);font-size:20px;font-weight:600}
  .card h3{font-size:15.5px;font-weight:600;margin:6px 0 5px}
  .card p{font-size:14px;color:var(--muted);line-height:1.5}
  .steps{display:grid;gap:12px}
  .step{display:flex;gap:15px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .step .num{flex:none;width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;
    font-family:"Fraunces",serif;font-weight:600;display:flex;align-items:center;justify-content:center;font-size:15px}
  .step p{font-size:15px}

  .ctaBlock{text-align:center;padding:44px 0 20px}
  .ctaBlock .t{font-family:"Fraunces",serif;font-size:clamp(20px,3.6vw,27px);font-weight:500;max-width:26ch;margin:0 auto}
  .share{display:inline-flex;align-items:center;gap:8px;margin-top:16px;background:transparent;color:var(--muted);
    border:1px solid var(--line);cursor:pointer;font-family:inherit;font-weight:500;font-size:14px;
    padding:11px 20px;border-radius:999px;transition:.15s}
  .share:hover{border-color:var(--accent);color:var(--ink)}

  footer{padding:22px 0 40px;color:var(--muted);font-size:13px;border-top:1px solid var(--line);margin-top:20px;text-align:center}
  footer a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line)}
  footer a:hover{color:var(--accent);border-color:var(--accent)}

  @media(max-width:560px){.g4,.g3{grid-template-columns:1fr}.hero{padding:38px 0 26px}}
  @media(prefers-reduced-motion:reduce){
    *{transition:none!important;scroll-behavior:auto}
    .flowline{animation:none}
    .coinMotion{display:none}
  }
</style>
</head>

      s1_2a:"bis €20 000",s1_2h:"Kosten",s1_2p:"Funcionamento 2030 — Erstattung bereits gezahlter Miete, Sozialabgaben, Energie und Wasser.",
      s1_3a:"bis €25 000",s1_3h:"Energie",s1_3p:"Solar, Batterien und Ladestationen — schlüsselfertig mit dem Schwesterpaket nEm.",

      cta2:"nAm öffnen →",
      share:"An einen Unternehmer-Freund senden",
      shareText:"Prüfe, wie viel der Staat deinem Unternehmen auf Madeira schulden könnte — 6 Fragen:",
      copied:"Link kopiert ✓"
    }
  };

  var VALID=["pt","en","ru","es","de"], lang="pt";
  var params=new URLSearchParams(location.search);
  var pl=params.get("lang"); var sl=null;
  try{sl=localStorage.getItem("nam-lang")}catch(e){}
  if(VALID.indexOf(pl)>=0) lang=pl; else if(VALID.indexOf(sl)>=0) lang=sl;

  var pt=params.get("theme"); var st=null;
  try{st=localStorage.getItem("nam-theme")}catch(e){}
  var theme=(pt==="light"||pt==="night")?pt:(st==="light"||st==="night")?st:"night";
  applyTheme(theme);
  function applyTheme(t){
    theme=t;
    if(t==="light") document.documentElement.setAttribute("data-theme","light");
    else document.documentElement.removeAttribute("data-theme");
    var b=document.getElementById("themeBtn"); if(b) b.textContent=(t==="light")?"☀":"☾";
    try{localStorage.setItem("nam-theme",t)}catch(e){}
  }
  document.getElementById("themeBtn").onclick=function(){applyTheme(theme==="light"?"night":"light")};

  function q(url){return url+(url.indexOf("?")>=0?"&":"?")+"lang="+lang+"&theme="+theme}
  var HUB="https://ikartuzov-hub.github.io/seedwave-catalog/hub/";
  var APP="https://ikartuzov-hub.github.io/nam/";
  var LI="https://www.linkedin.com/in/igor-kartuzov/";

  var A_MAX=70500; /* потолок прямых апойо (сорт А) — синхронно с subsidies.json */
  function fmt(n){
    var loc=lang==="ru"?"ru-RU":lang==="en"?"en-GB":lang==="es"?"es-ES":lang==="de"?"de-DE":"pt-PT";
    return "€"+n.toLocaleString(loc);
  }
  var tickTimer=null;
  function runTicker(){
    if(tickTimer) cancelAnimationFrame(tickTimer);
    var el=document.getElementById("ticker"), tb=document.getElementById("tierb");
    tb.classList.remove("on");
    var reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if(reduce){el.textContent=fmt(A_MAX);tb.classList.add("on");return}
    var t0=null, DUR=2200;
    function frame(ts){
      if(!t0) t0=ts;
      var p=Math.min((ts-t0)/DUR,1);
      var e=1-Math.pow(1-p,3); /* easeOutCubic */
      el.textContent=fmt(Math.round(A_MAX*e));
      if(p<1){tickTimer=requestAnimationFrame(frame)}
      else{tb.classList.add("on")}
    }
    tickTimer=requestAnimationFrame(frame);
  }

  function setText(){
    var D=I18N[lang];
    document.documentElement.lang=lang;
    document.querySelectorAll("[data-i18n]").forEach(function(el){
      var k=el.getAttribute("data-i18n"); if(D[k]!=null) el.textContent=D[k];
    });
    document.getElementById("langBtn").textContent=lang.toUpperCase();
    document.querySelectorAll("#langMenu button").forEach(function(b){
      b.classList.toggle("on",b.dataset.lang===lang);
    });
    document.getElementById("ctaTop").href=q(APP);
    document.getElementById("ctaBottom").href=q(APP);
    document.getElementById("foot").innerHTML=
      '© '+(new Date().getFullYear())+' <a href="'+q(HUB)+'" target="_blank" rel="noopener">SeedWave</a> · <a href="'+LI+'" target="_blank" rel="noopener">Igor Kartuzov</a>';
    runTicker();
  }

  var lb=document.getElementById("langBtn"), lm=document.getElementById("langMenu");
  function closeLang(){lm.classList.remove("open");lb.setAttribute("aria-expanded","false")}
  lb.onclick=function(e){e.stopPropagation();var o=lm.classList.toggle("open");lb.setAttribute("aria-expanded",o?"true":"false")};
  document.addEventListener("click",function(e){if(!e.target.closest(".langwrap")) closeLang()});
  lm.querySelectorAll("button").forEach(function(b){
    b.onclick=function(){closeLang();
      if(b.dataset.lang!==lang){lang=b.dataset.lang;try{localStorage.setItem("nam-lang",lang)}catch(e){};setText()}
    };
  });

  document.getElementById("shareBtn").onclick=function(){
    var D=I18N[lang], url=q(APP), text=D.shareText;
    if(navigator.share){navigator.share({title:"nAm",text:text,url:url}).catch(function(){})}
    else{
      var full=text+" "+url, btn=this, old=D.share;
      (navigator.clipboard?navigator.clipboard.writeText(full):Promise.reject()).then(function(){
        btn.textContent=D.copied;setTimeout(function(){btn.textContent=old},1800);
      }).catch(function(){prompt("",full)});
    }
  };

  setText();
})();
</script>
