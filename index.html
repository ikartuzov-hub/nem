<style>
  :root{
    --bg:#07221B; --ink:#EAF7F0; --muted:#93B4A6; --accent:#12D68A;
    --line:#12463A; --card:#0C2E25; --cardline:#153A30;
    --btnbg:#123E32; --btnline:#3A7A64;
  }
  :root[data-theme="light"]{
    --bg:#F1FAF5; --ink:#0A2E22; --muted:#5B7A6E; --accent:#0E9E6E;
    --line:#D3E8DE; --card:#FFFFFF; --cardline:#E2F0EA;
    --btnbg:#FFFFFF; --btnline:#CFE6DB;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:880px;margin:0 auto;padding:0 22px}

  .topbar{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line)}
  .topbar .bar{max-width:880px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px}
  .brand svg{width:26px;height:26px;flex:none}
  .brand .wm{font-family:"Fraunces",serif;font-weight:600;font-size:18px;letter-spacing:.3px}
  .brand .wm b{color:var(--accent);font-weight:600}
  .topctrl{display:flex;align-items:center;gap:8px}
  .rbtn{width:40px;height:40px;min-width:40px;padding:0;border-radius:50%;border:1px solid var(--btnline);
    background:var(--btnbg);color:var(--ink);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.15s;flex:none}
  .rbtn:hover{border-color:var(--accent)}
  .langwrap{position:relative}
  .menu{position:absolute;top:48px;right:0;background:var(--card);border:1px solid var(--btnline);border-radius:12px;
    padding:6px;min-width:176px;display:none;box-shadow:0 12px 30px rgba(0,0,0,.28);z-index:30}
  .menu.open{display:block}
  .menu button{display:flex;gap:10px;align-items:center;width:100%;padding:8px 10px;border-radius:8px;border:none;
    background:transparent;text-align:left;cursor:pointer;color:var(--ink);font-family:inherit;font-size:14px}
  .menu button:hover{background:var(--bg)}
  .menu button .code{color:var(--muted);font-weight:600;width:26px}
  .menu button.active,.menu button.active .code{color:var(--accent)}

  .hero{padding:56px 0 44px}
  .kicker{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:16px}
  h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(34px,6.4vw,56px);line-height:1.04;letter-spacing:-.6px;max-width:14ch}
  .sub{margin-top:20px;font-size:clamp(17px,2.3vw,20px);color:var(--muted);max-width:52ch}

  section{padding:38px 0;border-top:1px solid var(--line)}
  .eyebrow{font-family:"Fraunces",serif;font-size:21px;font-weight:600;margin-bottom:22px}
  .grid{display:grid;gap:16px;grid-template-columns:repeat(3,1fr)}
  .card{background:var(--card);border:1px solid var(--cardline);border-radius:16px;padding:22px 20px}
  .card .ic{width:30px;height:30px;color:var(--accent);margin-bottom:12px}
  .card h3{font-size:16.5px;font-weight:600;margin-bottom:7px}
  .card p{font-size:14.5px;color:var(--muted);line-height:1.55}
  .steps{display:grid;gap:12px}
  .step{display:flex;gap:16px;align-items:center;background:var(--card);border:1px solid var(--cardline);border-radius:14px;padding:16px 20px}
  .step .num{flex:none;width:32px;height:32px;border-radius:50%;background:var(--accent);color:#04140E;
    font-family:"Fraunces",serif;font-weight:600;display:flex;align-items:center;justify-content:center;font-size:15px}
  .step p{font-size:16px}

  .close{padding:54px 0 40px;text-align:center;border-top:1px solid var(--line)}
  .cta{display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:#04140E;
    text-decoration:none;font-weight:600;font-size:19px;padding:16px 54px;border-radius:999px;transition:.15s}
  .cta:hover{transform:translateY(-1px)}
  .energy{margin-top:34px}
  .energy svg{width:100%;max-width:540px;height:auto}
  .flowline{stroke-dasharray:5 9;animation:flow 1.4s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-14}}

  footer{padding:24px 0 40px;color:var(--muted);font-size:13px;border-top:1px solid var(--line);text-align:center}
  footer a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--accent)}
  footer a:hover{color:var(--ink)}

  @media(max-width:600px){.grid{grid-template-columns:1fr}.hero{padding:44px 0 30px}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto}.flowline{animation:none}}
</style>
</head>

        <rect x="276" y="45" width="18" height="8" rx="2" fill="var(--ink)"/>

  <footer class="wrap">© <span id="fyear">2026</span> <a id="hubLink" href="https://ikartuzov-hub.github.io/seedwave-catalog/hub/">SeedWave</a> · <a href="https://www.linkedin.com/in/igor-kartuzov/">Igor Kartuzov</a></footer>

<script>

    en:{kicker:"Energy · Madeira",

    pt:{kicker:"Energia · Madeira",

      b1t:"Poupança de energia",b1p:"Sol de dia, bateria à noite — a fatura da luz desce. A casa funciona com a sua própria energia limpa.",
      b2t:"Novas tecnologias",b2p:"Painéis, armazenamento e carregamento de VE — um circuito de energia inteligente de última geração.",
      b3t:"Subsídio e apoio do Estado",b3p:"Os programas do Estado +ENERGIA e Fundo Ambiental cobrem uma parte significativa do custo. Toda a documentação fica a cargo do projeto.",
      howt:"Como funciona",
      s1:"Avaliam-se o telhado, o consumo e o retorno.",s2:"Trata-se da candidatura ao subsídio e prepara-se toda a documentação.",s3:"Instala-se chave-na-mão — painéis, bateria e carregamento.",
      cta:"Quero"},
    de:{kicker:"Energie · Madeira",
      sub:"Sonne, Batterien und Ladepunkte für Ihr Zuhause — saubere, grüne Energie mit Förderung und staatlicher Unterstützung, schlüsselfertig.",
      b1t:"Energie sparen",b1p:"Sonne am Tag, Batterie am Abend — die Stromrechnung sinkt. Das Haus läuft mit eigener sauberer Energie.",

      cta:"Ich will"},
    es:{kicker:"Energía · Madeira",
      sub:"Sol, baterías y carga para tu casa — energía limpia y verde, con subvención y apoyo del Estado, llave en mano.",
      b1t:"Ahorro de energía",b1p:"Sol de día, batería de noche — la factura de la luz baja. La casa funciona con su propia energía limpia.",
      b2t:"Nuevas tecnologías",b2p:"Paneles, almacenamiento y carga de VE — un circuito de energía inteligente de última generación.",
      b3t:"Subvención y apoyo del Estado",b3p:"Los programas estatales +ENERGIA y Fundo Ambiental cubren una parte importante del coste. Toda la gestión corre a cargo del proyecto.",
      howt:"Cómo funciona",
      s1:"Se evalúan el tejado, el consumo y la amortización.",s2:"Se tramita la solicitud de subvención y se preparan todos los documentos.",s3:"Se instala llave en mano — paneles, batería y carga.",
      cta:"Quiero"}
  };
  var LANGS=["ru","en","pt","es","de"];
  document.getElementById("fyear").textContent=new Date().getFullYear();
  var root=document.documentElement, q=new URLSearchParams(location.search);

  function detectLang(){
    var p=q.get("lang"); if(p&&I18N[p])return p;
    var s=localStorage.getItem("nem-lang"); if(s&&I18N[s])return s;
    var n=(navigator.language||"ru").slice(0,2).toLowerCase(); if(I18N[n])return n;
    return "ru";
  }
  function setLang(l){
    if(!I18N[l])l="ru";
    root.lang=l;
    document.querySelectorAll("[data-i18n]").forEach(function(el){
      var k=el.getAttribute("data-i18n"); if(I18N[l][k]!=null)el.textContent=I18N[l][k];
    });
    document.getElementById("langBtn").textContent=l.toUpperCase();
    document.querySelectorAll("#langMenu button").forEach(function(b){
      b.classList.toggle("active",b.dataset.lang===l);
    });
    document.getElementById("hubLink").href="https://ikartuzov-hub.github.io/seedwave-catalog/hub/?lang="+l;
    document.getElementById("ctaBtn").href="https://t.me/SeedWaveBot?start=nem_"+l;
    localStorage.setItem("nem-lang",l);
  }
  setLang(detectLang());

  var lb=document.getElementById("langBtn"), lm=document.getElementById("langMenu");
  lb.onclick=function(e){e.stopPropagation();lm.classList.toggle("open");};
  lm.querySelectorAll("button").forEach(function(b){
    b.onclick=function(){setLang(b.dataset.lang);lm.classList.remove("open");};
  });
  document.addEventListener("click",function(){lm.classList.remove("open");});
  document.addEventListener("keydown",function(e){if(e.key==="Escape")lm.classList.remove("open");});

  var savedTheme=q.get("theme")||localStorage.getItem("nem-theme")||"dark";
  if(savedTheme==="light")root.setAttribute("data-theme","light");
  var tb=document.getElementById("themeBtn");
  function syncTheme(){tb.textContent=root.getAttribute("data-theme")==="light"?"☾":"☀";}
  syncTheme();
  tb.onclick=function(){
    var light=root.getAttribute("data-theme")==="light";
    if(light){root.removeAttribute("data-theme");localStorage.setItem("nem-theme","dark");}
    else{root.setAttribute("data-theme","light");localStorage.setItem("nem-theme","light");}
    syncTheme();
  };
</script>
